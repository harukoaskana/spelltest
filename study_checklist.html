<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>テスト対策チェックリスト</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh;}
.container{max-width:640px;margin:0 auto;padding:16px;}
h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.subtitle{font-size:13px;color:#888;margin-bottom:16px;}
.subj{background:#fff;border-radius:14px;margin-bottom:12px;border:1px solid #e5e5e0;overflow:hidden;}
.subj-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;}
.subj-name{font-size:16px;font-weight:500;}
.pct-label{font-size:13px;color:#888;}
.prog-bar{height:4px;background:#f0f0ea;margin:0 16px 10px;}
.prog-fill{height:4px;background:#1D9E75;transition:width 0.3s;}
.body{padding:0 16px 12px;}
.section{margin-bottom:10px;}
.section-title{font-size:13px;font-weight:500;color:#555;margin-bottom:5px;padding:3px 8px;background:#f5f5f0;border-radius:6px;display:inline-block;}
.steps{display:flex;gap:6px;flex-wrap:wrap;}
.step{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;border:1px solid #e0e0d8;background:#fafaf8;cursor:pointer;font-size:13px;flex:1;min-width:80px;}
.step.done{background:#E1F5EE;border-color:#5DCAA5;color:#0F6E56;}
.check{width:16px;height:16px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;}
.step.done .check{background:#1D9E75;border-color:#1D9E75;color:#fff;}
.chevron{font-size:14px;color:#aaa;transition:transform 0.2s;margin-right:8px;}
.chevron.open{transform:rotate(180deg);}
.hidden{display:none;}
.reset-btn{font-size:12px;color:#aaa;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.reset-btn:hover{color:#E24B4A;}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.print-btn{padding:8px 16px;font-size:14px;background:#1D9E75;color:#fff;border:none;border-radius:10px;cursor:pointer;}
.print-btn:active{background:#0F6E56;}

/* 印刷スタイル */
@media print {
  body{background:#fff;}
  .container{max-width:100%;padding:10px;}
  .top-bar .print-btn{display:none;}
  .subj{border:1px solid #ccc;border-radius:4px;margin-bottom:8px;break-inside:avoid;}
  .subj-head{padding:8px 12px;}
  .subj-name{font-size:14px;}
  .prog-bar{display:none;}
  .body{padding:0 12px 8px;}
  .section-title{font-size:12px;padding:2px 6px;}
  .steps{gap:4px;}
  .step{padding:5px 8px;font-size:11px;border:1px solid #ccc;background:#fff;}
  .step.done{background:#E1F5EE;}
  .check{width:14px;height:14px;border:1px solid #999;}
  .reset-btn{display:none;}
  .chevron{display:none;}
  .hidden{display:block !important;}
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div>
      <h1>テスト対策チェックリスト</h1>
      <p class="subtitle">6月1日（月）実施</p>
    </div>
    <button class="print-btn" onclick="window.print()">🖨️ 印刷</button>
  </div>
  <div id="app"></div>
</div>

<script>
const KEY='checklist_detail_v2';
const STEP_LABELS=['ワーク','解き直し','理解確認'];

const SUBJECTS=[
  {name:'数学', sections:[
    {title:'教科書 P11〜30'},
    {title:'教科書 P31〜51'},
    {title:'ワーク P2〜5'},
    {title:'ワーク P6〜10'},
    {title:'ワーク P11〜15'},
    {title:'ワーク P16〜19'},
  ]},
  {name:'英語', sections:[
    {title:'教科書 P2〜10'},
    {title:'教科書 P11〜18'},
    {title:'ワーク P2〜6'},
    {title:'ワーク P7〜12'},
    {title:'ワーク P13〜17'},
    {title:'語順トレーニング P2〜5'},
    {title:'積み上げ：小学校の復習 / Unit0'},
    {title:'積み上げ：Unit1'},
    {title:'リスニング対策'},
  ]},
  {name:'社会', sections:[
    {title:'教科書 P2〜13（世界の姿）'},
    {title:'ワーク P4〜7'},
    {title:'ワーク P8〜12'},
    {title:'教科書 P14〜23（日本の姿）'},
    {title:'ワーク P13〜17'},
  ]},
  {name:'国語', sections:[
    {title:'教科書 〜P25'},
    {title:'教科書 P26〜51'},
    {title:'ワーク 〜P10'},
    {title:'ワーク P11〜20'},
    {title:'ワーク P21〜35'},
    {title:'漢字スキル 1〜4'},
    {title:'漢字スキル 5〜8'},
    {title:'月の異名を覚える'},
  ]},
  {name:'理科', sections:[
    {title:'教科書 P6〜20（観察・分類・花のつくり）'},
    {title:'教科書 P21〜43（種子植物・植物のなかま）'},
    {title:'ワーク P2〜5'},
    {title:'ワーク P6〜8'},
    {title:'ワーク P18〜20'},
    {title:'ワーク P21〜23'},
    {title:'実験器具の使い方確認'},
  ]},
];

function load(){try{return JSON.parse(localStorage.getItem(KEY)||'null');}catch(e){return null;}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){}}

var saved=load();
var state={};
SUBJECTS.forEach(function(s){
  state[s.name]=saved&&saved[s.name]?saved[s.name]:{done:{},open:true};
});

function totalSteps(sname){
  return SUBJECTS.find(function(x){return x.name===sname;}).sections.length*3;
}
function doneCount(sname){var c=0;for(var k in state[sname].done){if(state[sname].done[k])c++;}return c;}
function toggle(sname,si,ti){var k=si+'-'+ti;state[sname].done[k]=!state[sname].done[k];save(state);render();}
function resetSubj(sname){state[sname].done={};save(state);render();}
function toggleOpen(sname){state[sname].open=!state[sname].open;save(state);render();}

function render(){
  var html='';
  SUBJECTS.forEach(function(subj){
    var sn=subj.name;
    var total=totalSteps(sn);
    var done=doneCount(sn);
    var pct=total>0?Math.round(done/total*100):0;
    var isOpen=state[sn].open;
    html+='<div class="subj">';
    html+='<div class="subj-head" onclick="toggleOpen(\''+sn+'\')">';
    html+='<div style="display:flex;align-items:center;">';
    html+='<span class="chevron'+(isOpen?' open':'')+'">▼</span>';
    html+='<span class="subj-name">'+sn+'</span>';
    html+='</div>';
    html+='<div style="display:flex;align-items:center;gap:8px;">';
    html+='<span class="pct-label">'+done+'/'+total+' ('+pct+'%)</span>';
    html+='<button class="reset-btn" onclick="event.stopPropagation();resetSubj(\''+sn+'\')">↺</button>';
    html+='</div></div>';
    html+='<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
    html+='<div class="body'+(isOpen?'':' hidden')+'">';
    subj.sections.forEach(function(sec,si){
      html+='<div class="section">';
      html+='<div class="section-title">'+sec.title+'</div>';
      html+='<div class="steps">';
      for(var ti=0;ti<3;ti++){
        var k=si+'-'+ti;
        var isDone=!!state[sn].done[k];
        html+='<div class="step'+(isDone?' done':'')+'" onclick="toggle(\''+sn+'\','+si+','+ti+')">';
        html+='<div class="check">'+(isDone?'✓':'')+' </div>';
        html+=STEP_LABELS[ti];
        html+='</div>';
      }
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('app').innerHTML=html;
}
render();
</script>
</body>
</html>
